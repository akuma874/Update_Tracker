<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Update Tracker</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: rgba(59, 130, 246, 0.15);
            --accent: #60a5fa;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            
            /* Default View: High-Contrast Premium Dark Slate Theme */
            --bg: #0f172a;
            --card-bg: #1e293b;
            --panel-bg: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --text-light: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --accordion-bg: #1e293b;
            --trigger-bg: #1e293b;
            --trigger-hover: #334155;
        }

        /* Admin Mode: High-Contrast Warm Charcoal / Dark Espresso & Amber Layout */
        body.admin-mode {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --panel-bg: #1a1510;
            --border: #3d3020;
            --text: #fff3e0;
            --text-light: #bcaaa4;
            --input-bg: #2d2216;
            --accordion-bg: #241c13;
            --trigger-bg: #2a2015;
            --trigger-hover: #3e3020;
            --primary: #ffb74d;
            --accent: #ffa726;
            --primary-light: rgba(255, 183, 77, 0.15);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.5;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .grid-layout {
                grid-template-columns: 350px 1fr;
            }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 1.25rem;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-light);
        }

        input[type="text"], input[type="url"], input[type="password"], select, textarea {
            width: 100%;
            padding: 0.65rem 0.85rem;
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        button {
            cursor: pointer;
            padding: 0.65rem 1.25rem;
            border-radius: 6px;
            font-weight: 600;
            border: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        
        .btn-primary { background-color: var(--primary); color: #000; }
        body:not(.admin-mode) .btn-primary { color: #fff; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-warning { background-color: var(--warning); color: black; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-secondary { background-color: var(--border); color: var(--text); }

        .search-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
        }

        .folder-block {
            background-color: var(--accordion-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .folder-trigger {
            width: 100%;
            padding: 1rem 1.5rem;
            background-color: var(--trigger-bg);
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: left;
            border-radius: 0;
        }

        .folder-trigger:hover { background-color: var(--trigger-hover); }

        .folder-content {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .update-item {
            background-color: var(--input-bg);
            border-left: 4px solid var(--primary);
            padding: 1.25rem;
            border-radius: 0 8px 8px 0;
            position: relative;
        }

        .update-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .update-title { margin: 0; font-size: 1.1rem; font-weight: 600; }
        .update-date { font-size: 0.8rem; color: var(--text-light); }
        .update-desc { margin: 0.5rem 0 0 0; color: var(--text-light); white-space: pre-wrap; font-size: 0.95rem; }
        
        .attachment-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            margin-top: 0.75rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .attachment-link:hover { text-decoration: underline; }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 0.5rem; }
        th, td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { color: var(--text-light); font-weight: 500; }

        .flex-btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; }

        .no-data {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
            font-style: italic;
        }

        .utility-box {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1>🚀 Update Tracker</h1>
        <button id="adminBtn" class="btn-secondary" onclick="toggleAdminMode()">⚙️ Admin Mode</button>
    </nav>

    <div class="container">
        
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="search" placeholder="🔍 Search updates by title or description..." oninput="executeWorkspaceSearch()">
            </div>
            <button class="btn-secondary" onclick="clearWorkspaceSearchFilters()">Reset</button>
        </div>

        <div class="grid-layout">
            
            <div class="sidebar">
                
                <div class="card admin-only" style="margin-bottom: 1.5rem;">
                    <h2>📂 Create Folder</h2>
                    <form id="folderForm" onsubmit="createNewWorkspaceFolder(event)">
                        <div class="form-group">
                            <label for="folderName">Folder Name</label>
                            <input type="text" id="folderName" placeholder="e.g., Sprint 1 Updates" required>
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%;">Create Folder</button>
                    </form>
                </div>

                <div class="card admin-only" style="margin-bottom: 1.5rem;">
                    <h2>📝 Add New Update</h2>
                    <form id="updateForm" onsubmit="publishNewUpdateItemLog(event)">
                        <div class="form-group">
                            <label for="updateFolder">Select Folder</label>
                            <select id="updateFolder" required>
                                <option value="">-- Select Folder --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="updateTitle">Title</label>
                            <input type="text" id="updateTitle" placeholder="e.g., Login Bug Fixed" required>
                        </div>
                        <div class="form-group">
                            <label for="updateDesc">Description</label>
                            <textarea id="updateDesc" rows="4" placeholder="Enter update details..." required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="updateUrl">Reference Link (Optional)</label>
                            <input type="url" id="updateUrl" placeholder="https://example.com">
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%;">Add Update</button>
                    </form>
                </div>

                <div class="card admin-only">
                    <h2>⚙️ Manage Folders</h2>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Folder</th>
                                    <th>Items</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="management-table-tbody"></tbody>
                        </table>
                    </div>
                    
                    <div class="utility-box">
                        <button type="button" class="btn-success" style="flex:1; font-size:12px; padding:8px;" onclick="backupJSONExportData()">📤 Export JSON</button>
                        <div style="position:relative; flex:1;">
                            <button type="button" class="btn-secondary" style="width:100%; font-size:12px; padding:8px;">📥 Import JSON</button>
                            <input type="file" id="bulk-import-input" accept=".json" style="position:absolute; left:0; top:0; opacity:0; width:100%; height:100%; cursor:pointer;" onchange="importJSONBackupData(event)">
                        </div>
                    </div>
                </div>

            </div>

            <div class="main-content" id="repo">
                <div class="no-data">⌛ Synchronizing updates with Firebase cloud database...</div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase configuration loaded from your platform console screen
        const firebaseConfig = {
            apiKey: "AIzaSyBeMu-xGaNx_SM_lfBlFUQILZprgTq3pxQ",
            authDomain: "uat-dashboard-50539.firebaseapp.com",
            projectId: "uat-dashboard-50539",
            storageBucket: "uat-dashboard-50539.firebasestorage.app",
            messagingSenderId: "249677258648",
            appId: "1:249677258648:web:99da7320cf1d979ad455ed",
            measurementId: "G-3DFXG8H73"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Separate document partition for tracking configs
        const trackerDocRef = doc(db, "config_collection", "tracker_config");

        let trackerData = { folders: {} };
        let openFoldersState = {}; 
        const ADMIN_PASSWORD = "Abhi@1999";

        // DOM Targets
        const repo = document.getElementById('repo');
        const selectDropdown = document.getElementById('updateFolder');
        const managementTbody = document.getElementById('management-table-tbody');

        // Real-time Event Listener to capture database state transforms instantly
        onSnapshot(trackerDocRef, (docSnap) => {
            if (docSnap.exists()) {
                trackerData = docSnap.data();
                if (!trackerData.folders) trackerData.folders = {};
            } else {
                // Initialize default empty schema if database path is fresh
                trackerData = { folders: {} };
                setDoc(trackerDocRef, trackerData);
            }
            renderTrackerWorkspace();
        });

        // Write transactions to cloud
        async function syncTrackerToFirebase() {
            try {
                await setDoc(trackerDocRef, trackerData);
            } catch (error) {
                console.error("Database cloud write error: ", error);
                alert("⚠️ Sync Failed! Verify Firestore Rules are deployed.");
            }
        }

        function renderTrackerWorkspace() {
            const currentSelectedValue = selectDropdown.value;

            selectDropdown.innerHTML = '<option value="">-- Select Folder --</option>';
            managementTbody.innerHTML = '';
            repo.innerHTML = '';

            const folderNames = Object.keys(trackerData.folders).sort();

            if (folderNames.length === 0) {
                repo.innerHTML = `<div class="no-data">⚠️ No folders found. Switch to Admin Mode to create one.</div>`;
                return;
            }

            folderNames.forEach(folderName => {
                const option = document.createElement('option');
                option.value = folderName;
                option.textContent = folderName;
                selectDropdown.appendChild(option);

                const folderBlock = document.createElement('div');
                folderBlock.className = 'folder-block';

                const isOpen = openFoldersState[folderName] !== false; 

                const buttonTrigger = document.createElement('button');
                buttonTrigger.type = 'button';
                buttonTrigger.className = 'folder-trigger';
                buttonTrigger.innerHTML = `
                    <span>📂 ${folderName} (${trackerData.folders[folderName].length} items)</span>
                    <span class="chevron-indicator">${isOpen ? '▲' : '▼'}</span>
                `;
                buttonTrigger.onclick = () => toggleFolderStateVisibility(folderName);
                folderBlock.appendChild(buttonTrigger);

                const contentWrapper = document.createElement('div');
                contentWrapper.className = 'folder-content';
                contentWrapper.style.display = isOpen ? 'flex' : 'none';

                const itemsList = trackerData.folders[folderName];
                if (itemsList.length === 0) {
                    contentWrapper.innerHTML = `<div style="text-align:center; color:var(--text-light); font-style:italic; font-size:0.9rem;">Folder is empty.</div>`;
                } else {
                    const displayedItems = [...itemsList].reverse();
                    displayedItems.forEach((item) => {
                        const updateItem = document.createElement('div');
                        updateItem.className = 'update-item';
                        
                        const fileMarkup = item.url ? `<a href="${item.url}" target="_blank" class="attachment-link">📎 Reference Link</a>` : '';
                        
                        const actionButtonsMarkup = document.body.classList.contains('admin-mode') ? `
                            <div class="flex-btn-group" style="margin-top:1rem; border-top:1px dashed var(--border); padding-top:0.75rem;">
                                <button type="button" class="btn-warning" style="padding:4px 8px; font-size:11px; border-radius:4px;" onclick="modifyLoggedUpdateEntry('${folderName.replace(/'/g, "\\'")}', '${item.id}')">✏️ Edit</button>
                                <button type="button" class="btn-danger" style="padding:4px 8px; font-size:11px; border-radius:4px;" onclick="purgeLoggedUpdateEntry('${folderName.replace(/'/g, "\\'")}', '${item.id}')">🗑️ Delete</button>
                            </div>
                        ` : '';

                        updateItem.innerHTML = `
                            <div>
                                <div class="update-header">
                                    <h4 class="update-title">${item.title}</h4>
                                    <span class="update-date">📅 ${item.date}</span>
                                </div>
                                <p class="update-desc">${item.desc}</p>
                                ${fileMarkup}
                                ${actionButtonsMarkup}
                            </div>
                        `;
                        contentWrapper.appendChild(updateItem);
                    });
                }
                folderBlock.appendChild(contentWrapper);
                repo.appendChild(folderBlock);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:600; color:var(--accent);">${folderName}</td>
                    <td>${trackerData.folders[folderName].length} items</td>
                    <td>
                        <div class="flex-btn-group">
                            <button type="button" class="btn-warning" style="padding: 5px 10px; font-size:12px;" onclick="renameFolder('${folderName.replace(/'/g, "\\'")}')">✏️ Rename</button>
                            <button type="button" class="btn-danger" style="padding: 5px 10px; font-size:12px;" onclick="deleteFolder('${folderName.replace(/'/g, "\\'")}')">🗑️ Delete Folder</button>
                        </div>
                    </td>
                `;
                managementTbody.appendChild(tr);
            });

            if (trackerData.folders[currentSelectedValue]) {
                selectDropdown.value = currentSelectedValue;
            }
            executeWorkspaceSearch();
        }

        window.createNewWorkspaceFolder = function(e) {
            e.preventDefault();
            const inputField = document.getElementById('folderName');
            const name = inputField.value.trim();
            if (!name) return;

            if (trackerData.folders[name]) {
                alert("Folder already exists!");
                return;
            }

            trackerData.folders[name] = [];
            syncTrackerToFirebase();
            inputField.value = '';
        };

        window.publishNewUpdateItemLog = function(e) {
            e.preventDefault();
            const folder = document.getElementById('updateFolder').value;
            const title = document.getElementById('updateTitle').value.trim();
            const desc = document.getElementById('updateDesc').value.trim();
            const url = document.getElementById('updateUrl').value.trim();

            if (!folder || !title || !desc) return;

            const newLog = {
                id: 'log-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4),
                title,
                desc,
                date: new Date().toLocaleString(),
                url
            };

            trackerData.folders[folder].push(newLog);
            syncTrackerToFirebase();

            document.getElementById('updateTitle').value = '';
            document.getElementById('updateDesc').value = '';
            document.getElementById('updateUrl').value = '';
        };

        window.renameFolder = function(oldName) {
            const newName = prompt(`Rename folder "${oldName}" to:`, oldName);
            if (newName === null) return;
            const cleanName = newName.trim();
            if (!cleanName) return alert("Folder name cannot be empty.");

            if (trackerData.folders[cleanName] && cleanName !== oldName) {
                return alert("A folder with that name already exists.");
            }

            trackerData.folders[cleanName] = trackerData.folders[oldName];
            delete trackerData.folders[oldName];

            if (openFoldersState[oldName] !== undefined) {
                openFoldersState[cleanName] = openFoldersState[oldName];
                delete openFoldersState[oldName];
            }

            syncTrackerToFirebase();
        };

        window.deleteFolder = function(folderName) {
            if (confirm(`⚠️ Are you sure you want to delete "${folderName}" and all its contents permanently?`)) {
                delete trackerData.folders[folderName];
                delete openFoldersState[folderName];
                syncTrackerToFirebase();
            }
        };

        window.modifyLoggedUpdateEntry = function(folderName, logId) {
            const items = trackerData.folders[folderName];
            const itemIndex = items.findIndex(i => i.id === logId);
            if (itemIndex === -1) return;

            const currentItem = items[itemIndex];
            const newTitle = prompt("Edit Title:", currentItem.title);
            if (newTitle === null) return;

            const newDesc = prompt("Edit Description:", currentItem.desc);
            if (newDesc === null) return;

            const newUrl = prompt("Edit Reference Link (Optional):", currentItem.url);
            if (newUrl === null) return;

            if (!newTitle.trim() || !newDesc.trim()) return alert("Fields cannot be empty.");

            trackerData.folders[folderName][itemIndex].title = newTitle.trim();
            trackerData.folders[folderName][itemIndex].desc = newDesc.trim();
            trackerData.folders[folderName][itemIndex].url = newUrl.trim();
            trackerData.folders[folderName][itemIndex].date = new Date().toLocaleString() + " (Modified)";

            syncTrackerToFirebase();
        };

        window.purgeLoggedUpdateEntry = function(folderName, logId) {
            if (confirm("Delete this update log item?")) {
                trackerData.folders[folderName] = trackerData.folders[folderName].filter(i => i.id !== logId);
                syncTrackerToFirebase();
            }
        };

        function toggleFolderStateVisibility(folderName) {
            openFoldersState[folderName] = openFoldersState[folderName] === false;
            renderTrackerWorkspace();
        }

        window.executeWorkspaceSearch = function() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            const blocks = repo.getElementsByClassName('folder-block');

            if (!query) {
                for (let block of blocks) {
                    block.style.display = 'block';
                    const items = block.getElementsByClassName('update-item');
                    for (let item of items) item.style.display = 'block';
                }
                return;
            }

            for (let block of blocks) {
                let folderMatches = false;
                const items = block.getElementsByClassName('update-item');

                for (let item of items) {
                    const titleText = item.querySelector('.update-title').textContent.toLowerCase();
                    const descText = item.querySelector('.update-desc').textContent.toLowerCase();

                    if (titleText.includes(query) || descText.includes(query)) {
                        item.style.display = 'block';
                        folderMatches = true;
                    } else {
                        item.style.display = 'none';
                    }
                }
                block.style.display = folderMatches ? 'block' : 'none';
            }
        };

        window.clearWorkspaceSearchFilters = function() {
            document.getElementById('search').value = '';
            executeWorkspaceSearch();
        };

        window.toggleAdminMode = function() {
            if (document.body.classList.contains('admin-mode')) {
                document.body.classList.remove('admin-mode');
                document.getElementById('adminBtn').className = 'btn-secondary';
                document.getElementById('adminBtn').textContent = '⚙️ Admin Mode';
                renderTrackerWorkspace();
                return;
            }

            const password = prompt("Enter Admin Password:");
            if (password === ADMIN_PASSWORD) {
                document.body.classList.add('admin-mode');
                document.getElementById('adminBtn').className = 'btn-danger';
                document.getElementById('adminBtn').textContent = '🔑 Exit Admin Mode';
                renderTrackerWorkspace();
            } else if (password !== null) {
                alert("⚠️ Incorrect Password!");
            }
        };

        window.backupJSONExportData = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(trackerData, null, 4));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "tracker_backup.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        };

        window.importJSONBackupData = function(event) {
            const fileReader = new FileReader();
            const file = event.target.files[0];
            if (!file) return;

            fileReader.onload = async function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    if (parsedData && typeof parsedData.folders === 'object') {
                        if (confirm("Valid update tracker backup layout found. Overwrite live database?")) {
                            trackerData = parsedData;
                            await syncTrackerToFirebase();
                            alert("🚀 Success! Data migrated to Firebase completely.");
                        }
                    } else {
                        alert("Invalid JSON data layout formatting.");
                    }
                } catch (err) {
                    alert("Error processing JSON file structure.");
                }
            };
            fileReader.readAsText(file);
            event.target.value = '';
        };
    </script>
</body>
</html>
