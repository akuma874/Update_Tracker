<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Update Tracker Pro FINAL</title>
<style>
body{font-family:Segoe UI;margin:0;background:linear-gradient(135deg,#667eea,#764ba2);} 
.container{max-width:1000px;margin:30px auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 15px 35px rgba(0,0,0,.3)} 
h1{text-align:center;color:#333} 
button{background:#667eea;color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer} 
button:hover{background:#5a67d8} 
.folder{margin-top:20px;border-radius:10px;padding:15px;background:#f8fafc;border-left:6px solid #667eea} 
.folder-header{display:flex;justify-content:space-between;align-items:center} 
.topic{background:#edf2ff;padding:10px;border-radius:6px;margin-top:5px;cursor:pointer;font-weight:bold} 
.details{display:none;padding:10px;background:#f1f5f9;border-left:4px solid #667eea;margin-top:5px;white-space:pre-wrap;} 
.form-box{display:none;background:#eef2ff;padding:10px;border-radius:8px;margin-top:10px} 
input,textarea{width:100%;padding:6px;margin:5px 0;border-radius:5px;border:1px solid #ccc} 
textarea{white-space:pre-wrap;} 
.search{margin-bottom:10px;width:100%;padding:8px;border-radius:6px;border:1px solid #ccc} 
.add-btn{font-size:18px;padding:5px 10px}
</style>
</head>
<body>
<div class="container">
<h1>🚀 Update Tracker Pro</h1>
<input id="search" class="search" placeholder="Search updates..." oninput="searchItems()">
<button onclick="createFolder()">➕ Create Folder</button>
<button onclick="exportData()">📤 Export</button>
<div id="folders"></div>
</div>
<script>
let data = JSON.parse(localStorage.getItem('trackerData')||'[]');
function save(){localStorage.setItem('trackerData',JSON.stringify(data));render();}
function createFolder(){const name = prompt('Folder name'); if(!name) return; data.push({name,items:[],showForm:false}); save();}
function toggleForm(index){data[index].showForm=!data[index].showForm; save();}
function addItem(fi,form){const t=form.querySelector('.t').value;if(!t)return alert('Topic required');data[fi].items.push({topic:t,date:form.querySelector('.d').value,desc:form.querySelector('.ds').value,person:form.querySelector('.p').value});data[fi].showForm=false;save();}
function toggleDetails(el){let d=el.nextElementSibling; d.style.display=d.style.display==='block'?'none':'block';}
function deleteItem(fi,ii){if(confirm('Delete item?')){data[fi].items.splice(ii,1);save();}}
function render(){let f=document.getElementById('folders');f.innerHTML='';data.forEach((folder,fi)=>{let div=document.createElement('div');div.className='folder';div.innerHTML=`<div class='folder-header'><h3>📂 ${folder.name}</h3><button class='add-btn' onclick='toggleForm(${fi})'>➕</button></div><div class='form-box' style='display:${folder.showForm?'block':'none'}'><input class='t' placeholder='Topic'><input type='date' class='d'><textarea class='ds' placeholder='Paste bullets here'></textarea><input class='p' placeholder='Person'><button onclick='addItem(${fi},this.parentElement)'>Save</button></div>`;folder.items.forEach((it,ii)=>{let item=document.createElement('div');item.innerHTML=`<div class='topic' onclick='toggleDetails(this)'>📌 ${it.topic}</div><div class='details'>📅 Date: ${it.date}

📝 Description:
${it.desc}

👤 Person: ${it.person}

<button onclick='deleteItem(${fi},${ii})'>❌ Delete</button></div>`;div.appendChild(item);});f.appendChild(div);});}
function searchItems(){let q=document.getElementById('search').value.toLowerCase();document.querySelectorAll('.topic').forEach(t=>{t.parentElement.style.display=t.textContent.toLowerCase().includes(q)?'':'none';});}
function exportData(){let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='update_tracker_data.json';a.click();}
render();
</script>
</body>
</html>
