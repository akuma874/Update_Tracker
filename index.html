<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Update Tracker</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: rgba(59, 130, 246, 0.15);
            --accent: #60a5fa;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            
            /* Default View: High-Contrast Premium Dark Slate Theme */
            --bg: #0f172a;
            --card-bg: #1e293b;
            --panel-bg: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --text-light: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --accordion-bg: #1e293b;
            --trigger-bg: #1e293b;
            --trigger-hover: #334155;
        }

        /* Admin Mode: High-Contrast Warm Charcoal / Dark Espresso & Amber Layout */
        body.admin-mode {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --panel-bg: #1a1510;
            --border: #3d3020;
            --text: #fff3e0;
            --text-light: #bcaaa4;
            --input-bg: #2d2216;
            --accordion-bg: #241c13;
            --trigger-bg: #2a2015;
            --trigger-hover: #3e3020;
            --primary: #ffb74d;
            --accent: #ffa726;
            --primary-light: rgba(255, 183, 77, 0.15);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.5;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .grid-layout {
                grid-template-columns: 350px 1fr;
            }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 1.25rem;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-light);
        }

        input[type="text"], input[type="url"], input[type="password"], select, textarea {
            width: 100%;
            padding: 0.65rem 0.85rem;
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        button {
            cursor: pointer;
            padding: 0.65rem 1.25rem;
            border-radius: 6px;
            font-weight: 600;
            border: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        
        .btn-primary { background-color: var(--primary); color: #000; }
        body:not(.admin-mode) .btn-primary { color: #fff; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-warning { background-color: var(--warning); color: black; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-secondary { background-color: var(--border); color: var(--text); }

        .search-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
        }

        .folder-block {
            background-color: var(--accordion-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .folder-trigger {
            width: 100%;
            padding: 1rem 1.5rem;
            background-color: var(--trigger-bg);
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: left;
            border-radius: 0;
        }

        .folder-trigger:hover { background-color: var(--trigger-hover); }

        .folder-content {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .update-item {
            background-color: var(--input-bg);
            border-left: 4px solid var(--primary);
            padding: 1.25rem;
            border-radius: 0 8px 8px 0;
            position: relative;
        }

        .update-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .update-title { margin: 0; font-size: 1.1rem; font-weight: 600; }
        .update-date { font-size: 0.8rem; color: var(--text-light); }
        .update-desc { margin: 0.5rem 0 0 0; color: var(--text-light); white-space: pre-wrap; font-size: 0.95rem; }
        
        .attachment-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            margin-top: 0.75rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .attachment-link:hover { text-decoration: underline; }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 0.5rem; }
        th, td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { color: var(--text-light); font-weight: 500; }

        .flex-btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; }

        .no-data {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
            font-style: italic;
        }

        .utility-box {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1>🚀 Update Tracker</h1>
        <button id="adminBtn" class="btn-secondary" onclick="toggleAdminMode()">⚙️ Admin Mode</button>
    </nav>

    <div class="container">
        
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="search" placeholder="🔍 Search updates by title or description..." oninput="filterContent()">
            </div>
            <button class="btn-secondary" onclick="resetSearch()">Reset</button>
        </div>

        <div class="grid-layout">
            
            <div class="sidebar">
                
                <div class="card admin-only" style="margin-bottom: 1.5rem;">
                    <h2>📂 Create Folder</h2>
                    <form id="folderForm" onsubmit="addFolder(event)">
                        <div class="form-group">
                            <label for="folderName">Folder Name</label>
                            <input type="text" id="folderName" placeholder="e.g., Sprint 1 Updates" required>
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%;">Create Folder</button>
                    </form>
                </div>

                <div class="card admin-only" style="margin-bottom: 1.5rem;">
                    <h2>📝 Add New Update</h2>
                    <form id="updateForm" onsubmit="addUpdate(event)">
                        <div class="form-group">
                            <label for="updateFolder">Select Folder</label>
                            <select id="updateFolder" required>
                                <option value="">-- Select Folder --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="updateTitle">Title</label>
                            <input type="text" id="updateTitle" placeholder="e.g., Login Bug Fixed" required>
                        </div>
                        <div class="form-group">
                            <label for="updateDesc">Description</label>
                            <textarea id="updateDesc" rows="4" placeholder="Enter update details..." required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="updateUrl">Reference Link (Optional)</label>
                            <input type="url" id="updateUrl" placeholder="https://example.com">
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%;">Add Update</button>
                    </form>
                </div>

                <div class="card admin-only">
                    <h2>⚙️ Manage Folders</h2>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Folder</th>
                                    <th>Items</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="managementTableBody"></tbody>
                        </table>
                    </div>
                    
                    <div class="utility-box">
                        <button type="button" class="btn-success" style="flex:1; font-size:12px; padding:8px;" onclick="exportData()">📤 Export JSON</button>
                        <div style="position:relative; flex:1;">
                            <button type="button" class="btn-secondary" style="width:100%; font-size:12px; padding:8px;">📥 Import JSON</button>
                            <input type="file" id="importFile" accept=".json" style="position:absolute; left:0; top:0; opacity:0; width:100%; height:100%; cursor:pointer;" onchange="importData(event)">
                        </div>
                    </div>
                </div>

            </div>

            <div class="main-content" id="repo">
                <div class="no-data">⌛ Connecting to Firebase...</div>
            </div>

        </div>
    </div>

    <script>
        // 1. FIREBASE CONFIGURATION & INITIALIZATION
        const firebaseConfig = {
            apiKey: "AIzaSyBeMu-xGaNx_SM_lfBlFUQILZprgTq3pxQ",
            authDomain: "uat-dashboard-50539.firebaseapp.com",
            projectId: "uat-dashboard-50539",
            storageBucket: "uat-dashboard-50539.firebasestorage.app",
            messagingSenderId: "249677258648",
            appId: "1:249677258648:web:99da7320cf1d979ad455ed",
            measurementId: "G-3DFXG8H73"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const docRef = db.collection("config_collection").doc("tracker_config");

        // 2. GLOBAL VARIABLES
        let trackerData = { folders: {} };
        let openFolders = {}; 
        const ADMIN_PASSWORD = "Abhi@1999";

        // 3. FIREBASE REAL-TIME LISTENER (Replaces loadData)
        docRef.onSnapshot((doc) => {
            if (doc.exists) {
                trackerData = doc.data();
                if (!trackerData.folders) trackerData.folders = {};
            } else {
                trackerData = { folders: {} };
                saveData(); // Create document if it doesn't exist
            }
            renderTracker();
        });

        // 4. FIREBASE SAVE FUNCTION (Replaces local storage)
        function saveData() {
            docRef.set(trackerData)
                .then(() => console.log("Data synced to Firebase!"))
                .catch((error) => alert("Error saving data: " + error.message));
        }

        // 5. ALL ORIGINAL UI FUNCTIONS (Untouched)
        function toggleAdminMode() {
            const body = document.body;
            const adminBtn = document.getElementById('adminBtn');
            
            if (body.classList.contains('admin-mode')) {
                body.classList.remove('admin-mode');
                adminBtn.textContent = '⚙️ Admin Mode';
                adminBtn.className = 'btn-secondary';
                renderTracker();
            } else {
                const pass = prompt("Enter Admin Password:");
                if (pass === ADMIN_PASSWORD) {
                    body.classList.add('admin-mode');
                    adminBtn.textContent = '🔑 Exit Admin Mode';
                    adminBtn.className = 'btn-danger';
                    renderTracker();
                } else if (pass !== null) {
                    alert("❌ Incorrect Password!");
                }
            }
        }

        function toggleFolder(folderName) {
            openFolders[folderName] = openFolders[folderName] === false;
            renderTracker();
        }

        function addFolder(e) {
            e.preventDefault();
            const nameInput = document.getElementById('folderName');
            const name = nameInput.value.trim();
            
            if (trackerData.folders[name]) {
                alert('❌ A folder with this name already exists!');
                return;
            }
            
            trackerData.folders[name] = [];
            saveData();
            nameInput.value = '';
        }

        function addUpdate(e) {
            e.preventDefault();
            const folder = document.getElementById('updateFolder').value;
            const title = document.getElementById('updateTitle').value.trim();
            const desc = document.getElementById('updateDesc').value.trim();
            const url = document.getElementById('updateUrl').value.trim();
            
            const newUpdate = {
                id: 'up_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                title: title,
                desc: desc,
                url: url,
                date: new Date().toLocaleString()
            };
            
            trackerData.folders[folder].push(newUpdate);
            saveData();
            
            document.getElementById('updateTitle').value = '';
            document.getElementById('updateDesc').value = '';
            document.getElementById('updateUrl').value = '';
        }

        function deleteFolder(folderName) {
            if (confirm(`⚠️ Are you sure you want to delete the folder "${folderName}" and ALL its updates?`)) {
                delete trackerData.folders[folderName];
                delete openFolders[folderName];
                saveData();
            }
        }

        function renameFolder(oldName) {
            const newName = prompt(`Rename folder "${oldName}" to:`, oldName);
            if (newName && newName.trim() !== "" && newName.trim() !== oldName) {
                const cleanName = newName.trim();
                if (trackerData.folders[cleanName]) {
                    alert("❌ A folder with that name already exists!");
                    return;
                }
                trackerData.folders[cleanName] = trackerData.folders[oldName];
                delete trackerData.folders[oldName];
                if (openFolders[oldName] !== undefined) {
                    openFolders[cleanName] = openFolders[oldName];
                    delete openFolders[oldName];
                }
                saveData();
            }
        }

        function editUpdate(folderName, updateId) {
            const updates = trackerData.folders[folderName];
            const item = updates.find(u => u.id === updateId);
            if (!item) return;

            const newTitle = prompt("Edit Title:", item.title);
            if (newTitle === null) return;
            const newDesc = prompt("Edit Description:", item.desc);
            if (newDesc === null) return;
            const newUrl = prompt("Edit Reference Link:", item.url);
            if (newUrl === null) return;

            item.title = newTitle.trim() || item.title;
            item.desc = newDesc.trim() || item.desc;
            item.url = newUrl.trim();
            item.date = new Date().toLocaleString() + " (Edited)";

            saveData();
        }

        function deleteUpdate(folderName, updateId) {
            if (confirm("🗑️ Delete this update item log?")) {
                trackerData.folders[folderName] = trackerData.folders[folderName].filter(u => u.id !== updateId);
                saveData();
            }
        }

        function filterContent() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            const blocks = document.getElementsByClassName('folder-block');
            
            for (let block of blocks) {
                let hasVisibleItems = false;
                const items = block.getElementsByClassName('update-item');
                
                for (let item of items) {
                    const title = item.querySelector('.update-title').textContent.toLowerCase();
                    const desc = item.querySelector('.update-desc').textContent.toLowerCase();
                    
                    if (title.includes(query) || desc.includes(query)) {
                        item.style.display = 'block';
                        hasVisibleItems = true;
                    } else {
                        item.style.display = 'none';
                    }
                }
                block.style.display = (hasVisibleItems || !query) ? 'block' : 'none';
            }
        }

        function resetSearch() {
            document.getElementById('search').value = '';
            filterContent();
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(trackerData, null, 4));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", "tracker_backup.json");
            document.body.appendChild(dlAnchor);
            dlAnchor.click();
            dlAnchor.remove();
        }

        function importData(event) {
            const reader = new FileReader();
            const file = event.target.files[0];
            if (!file) return;
            
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (parsed && typeof parsed.folders === 'object') {
                        if (confirm("Valid backup parsed. Sync live data arrays to Firebase Firestore?")) {
                            trackerData = parsed;
                            saveData();
                        }
                    } else {
                        alert("❌ Parsing error: Missing standard folders property schema mapping.");
                    }
                } catch (err) {
                    alert("❌ Bad formatting. Upload proper text json maps.");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function renderTracker() {
            const repo = document.getElementById('repo');
            const selectDropdown = document.getElementById('updateFolder');
            const managementTbody = document.getElementById('managementTableBody');
            const isAdmin = document.body.classList.contains('admin-mode');
            const currentSelected = selectDropdown.value;

            selectDropdown.innerHTML = '<option value="">-- Select Folder --</option>';
            managementTbody.innerHTML = '';
            repo.innerHTML = '';

            const folders = Object.keys(trackerData.folders).sort();

            if (folders.length === 0) {
                repo.innerHTML = '<div class="no-data">📦 No update folders created yet. Switch to Admin Mode to start.</div>';
                return;
            }

            folders.forEach(folderName => {
                const opt = document.createElement('option');
                opt.value = folderName;
                opt.textContent = folderName;
                selectDropdown.appendChild(opt);

                const folderBlock = document.createElement('div');
                folderBlock.className = 'folder-block';

                const isOpen = openFolders[folderName] !== false;

                const trigger = document.createElement('button');
                trigger.type = 'button';
                trigger.className = 'folder-trigger';
                trigger.innerHTML = `
                    <span>📂 ${folderName} (${trackerData.folders[folderName].length} items)</span>
                    <span>${isOpen ? '▲' : '▼'}</span>
                `;
                trigger.onclick = () => toggleFolder(folderName);
                folderBlock.appendChild(trigger);

                const content = document.createElement('div');
                content.className = 'folder-content';
                content.style.display = isOpen ? 'flex' : 'none';

                const items = trackerData.folders[folderName];
                if (items.length === 0) {
                    content.innerHTML = '<div style="text-align:center; color:var(--text-light); font-style:italic; font-size:0.9rem;">Folder is empty.</div>';
                } else {
                    [...items].reverse().forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'update-item';
                        
                        let linksSection = item.url ? `<a href="${item.url}" target="_blank" class="attachment-link">📎 Reference Link</a>` : '';
                        let adminActions = isAdmin ? `
                            <div class="flex-btn-group" style="margin-top:1rem; border-top:1px dashed var(--border); padding-top:0.75rem;">
                                <button type="button" class="btn-warning" style="padding:4px 8px; font-size:11px; border-radius:4px;" onclick="editUpdate('${folderName.replace(/'/g, "\\'")}', '${item.id}')">✏️ Edit</button>
                                <button type="button" class="btn-danger" style="padding:4px 8px; font-size:11px; border-radius:4px;" onclick="deleteUpdate('${folderName.replace(/'/g, "\\'")}', '${item.id}')">🗑️ Delete</button>
                            </div>
                        ` : '';

                        div.innerHTML = `
                            <div>
                                <div class="update-header">
                                    <h4 class="update-title">${item.title}</h4>
                                    <span class="update-date">📅 ${item.date}</span>
                                </div>
                                <p class="update-desc">${item.desc}</p>
                                ${linksSection}
                                ${adminActions}
                            </div>
                        `;
                        content.appendChild(div);
                    });
                }

                folderBlock.appendChild(content);
                repo.appendChild(folderBlock);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:600; color:var(--accent);">${folderName}</td>
                    <td>${items.length} items</td>
                    <td>
                        <div class="flex-btn-group">
                            <button type="button" class="btn-warning" style="padding: 5px 10px; font-size:12px;" onclick="renameFolder('${folderName.replace(/'/g, "\\'")}')">✏️ Rename</button>
                            <button type="button" class="btn-danger" style="padding: 5px 10px; font-size:12px;" onclick="deleteFolder('${folderName.replace(/'/g, "\\'")}')">🗑️ Delete Folder</button>
                        </div>
                    </td>
                `;
                managementTbody.appendChild(tr);
            });

            if (trackerData.folders[currentSelected]) {
                selectDropdown.value = currentSelected;
            }
            filterContent();
        }
    </script>
</body>
</html>
